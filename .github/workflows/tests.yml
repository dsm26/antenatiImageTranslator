name: Streamlit App Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install streamlit pytest pillow requests google-generativeai

      # --- NEW STEP TO FIX THE SECRETS ERROR ---
      - name: Create dummy secrets
        run: |
          mkdir -p .streamlit
          echo 'GEMINI_API_KEY = "dummy_key_for_testing"' > .streamlit/secrets.toml

      - name: Run Tests
        run: pytest test_app.py
