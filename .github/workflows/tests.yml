name: Streamlit UI Integrity Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install streamlit pytest pillow requests google-generativeai

      - name: Create dummy secrets
        run: |
          mkdir -p .streamlit
          echo 'GEMINI_API_KEY = "dummy_key"' > .streamlit/secrets.toml

      - name: Run UI Tests
        # --tb=line keeps the output clean so you only see the failure line
        run: pytest test_app.py --tb=line
